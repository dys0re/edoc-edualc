# edoc-edualc 配置文件
# 对标 Spring Boot application.yml
# 环境变量覆盖: EDOC_ 前缀 + 下划线分隔路径
#   例: EDOC_SERVER_PORT=9090 → server.port=9090
# 特殊: ANTHROPIC_API_KEY / OPENAI_API_KEY 不需要 EDOC_ 前缀

server:
  port: 8080          # HTTP 端口 (EDOC_SERVER_PORT)
  mode: release       # gin 模式: debug / release / test

provider:
  default: anthropic  # 默认 provider: anthropic / openai (EDOC_PROVIDER)
  model: claude-sonnet-4-20250514  # 默认模型 (EDOC_MODEL)
  fallback_model: ""  # 模型限流时自动降级，空=不降级 (EDOC_PROVIDER_FALLBACK_MODEL)

anthropic:
  api_key: ""         # Anthropic API Key (ANTHROPIC_API_KEY)
  base_url: ""        # 自定义 base URL，空=官方 (ANTHROPIC_BASE_URL)

openai:
  api_key: ""         # OpenAI API Key (OPENAI_API_KEY)
  base_url: ""        # 自定义 base URL，空=官方 (OPENAI_BASE_URL)

agent:
  max_turns: 0        # Agent 最大循环轮数，0=无限 (EDOC_AGENT_MAX_TURNS)
  max_tokens: 8192    # 单次回复最大 token 数 (EDOC_AGENT_MAX_TOKENS)
  auto_compact_threshold: 0  # 自动压缩阈值(token数)，0=禁用 (EDOC_AGENT_AUTO_COMPACT_THRESHOLD)

tools:
  work_dir: "."       # 工具工作目录 (EDOC_TOOLS_WORK_DIR)
  shell: auto         # Shell: auto / powershell / bash / cmd (EDOC_TOOLS_SHELL)
  memory_dir: ""      # 记忆存储目录，空=自动推导 ~/.edoc/projects/<path>/memory/ (EDOC_TOOLS_MEMORY_DIR)
  bocha_api_key: ""   # Bocha AI Search API key，用于 WebSearch 工具 (BOCHA_API_KEY)

database:
  url: ""             # 完整连接串，优先级最高 (DATABASE_URL)
  host: localhost     # PG 主机 (EDOC_DATABASE_HOST)
  port: 5432          # PG 端口 (EDOC_DATABASE_PORT)
  user: edoc          # PG 用户 (EDOC_DATABASE_USER)
  password: ""        # PG 密码 (EDOC_DATABASE_PASSWORD)
  dbname: edoc        # PG 数据库名 (EDOC_DATABASE_DBNAME)
  sslmode: disable    # SSL 模式: disable / require / verify-full (EDOC_DATABASE_SSLMODE)

log:
  level: info         # 日志级别: debug / info / warn / error (EDOC_LOG_LEVEL)

